# Dependabot：自动跟进依赖更新与安全补丁。
# https://docs.github.com/code-security/dependabot
version: 2
updates:
  # Rust 共享核心
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "rust"

  # Android（Gradle version catalog）
  - package-ecosystem: "gradle"
    directory: "/apps/android"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "android"
    ignore:
      # AGP 固定在 8.7.x（D-013：用现成 android-35，避免装 cmdline-tools/android-36）；
      # 不接受 9.x 大版本跳变。8.x 的小版本/补丁仍允许。
      - dependency-name: "com.android.application"
        update-types: ["version-update:semver-major"]
      - dependency-name: "com.android.library"
        update-types: ["version-update:semver-major"]
      - dependency-name: "com.android.tools.build:gradle"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
      - "ci"
